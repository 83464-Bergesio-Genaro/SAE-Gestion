services:
  backend:
    image: api_web_sae_6:latest
    container_name: api-sae-container
    ports:
      - "1986:1986"
    environment:
      - ASPNETCORE_URLS=http://+:1986
    networks:
      - sae-network
    restart: always

  frontend:
    image: sae-gestion:latest
    container_name: web-sae-container
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - sae-network
    restart: always

networks:
  sae-network:
    driver: bridge